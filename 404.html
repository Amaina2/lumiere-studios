<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found — Lumière Studios</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--color-black);
      color: var(--color-off-white);
    }
    .error-page__code {
      font-family: var(--font-serif);
      font-size: clamp(5rem, 15vw, 10rem);
      color: var(--color-gold);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-page__title {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      margin-bottom: 1rem;
    }
    .error-page__text {
      color: rgba(248, 247, 244, 0.65);
      max-width: 420px;
      margin: 0 auto 2rem;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div>
      <p class="error-page__code" aria-hidden="true">404</p>
      <h1 class="error-page__title">This frame wasn't captured</h1>
      <p class="error-page__text">The page you're looking for doesn't exist or may have been moved.</p>
      <a href="./" class="btn btn--primary">Return Home</a>
    </div>
  </main>
</body>
</html>
